<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    <a-scene
      mindar-image="imageTargetSrc: 3targets.mind;"
      embedded
      color-space="sRGB"
      renderer="colorManagement: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <img id="s1000" src="S1000.png" crossorigin="anonymous">
        <img id="ventech" src="Ventech.png" crossorigin="anonymous">
        <img id="sound" src="Sound.png" crossorigin="anonymous">
      </a-assets>

      <!-- targetIndex 0 = first image uploaded to compiler -->
      <a-entity mindar-image-target="targetIndex: 0">
        <a-image src="#s1000" position="0 0 0" width="1" height="0.75"></a-image>
      </a-entity>

      <!-- targetIndex 1 = second image uploaded to compiler -->
      <a-entity mindar-image-target="targetIndex: 1">
        <a-image src="#ventech" position="0 0 0" width="1" height="0.75"></a-image>
      </a-entity>

      <!-- targetIndex 2 = third image uploaded to compiler -->
      <a-entity mindar-image-target="targetIndex: 2">
        <a-image src="#sound" position="0 0 0" width="1" height="0.75"></a-image>
      </a-entity>

      <a-entity camera></a-entity>

    </a-scene>
  </body>
</html>
