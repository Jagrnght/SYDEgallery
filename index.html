<!DOCTYPE html>
<html>
<head>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
</head>

<body style="margin: 0px; overflow: hidden;">
    <a-scene 
        embedded 
        arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
        vr-mode-ui="enabled: false"
        renderer="logarithmicDepthBuffer: true;">

        <a-assets>
            <img id="image-1" src="Ventech.png" crossorigin="anonymous">
            <img id="image-2" src="S1000.png" crossorigin="anonymous">
            <img id="image-3" src="Sound.png" crossorigin="anonymous">
        </a-assets>

        <a-nft type="nft" url="markers/SYDE" smooth="true" smoothCount="10">
            <a-image 
                src="#image-1" 
                position="50 0 -50" 
                rotation="-90 0 0" 
                width="100" 
                height="75">
            </a-image>
        </a-nft>

        <a-nft type="nft" url="markers/fountain" smooth="true">
            <a-image 
                src="#image-2" 
                position="50 0 -50" 
                rotation="-90 0 0" 
                width="100" 
                height="75">
            </a-image>
        </a-nft>

        <a-nft type="nft" url="markers/piano" smooth="true">
            <a-image 
                src="#image-3" 
                position="50 0 -50" 
                rotation="-90 0 0" 
                width="100" 
                height="75">
            </a-image>
        </a-nft>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
