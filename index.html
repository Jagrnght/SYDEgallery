<!DOCTYPE html>
<html>
<head>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        .arjs-loader {
            height: 100%; width: 100%; position: absolute; top: 0; left: 0;
            background-color: rgba(0, 0, 0, 0.8); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .arjs-loader div { text-align: center; font-size: 1.25em; color: white; font-family: sans-serif; }
        
        #cache-indicator {
            position: fixed; top: 10px; right: 10px; padding: 10px;
            background: red; color: white; z-index: 10000; font-weight: bold;
        }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">
    <div id="cache-indicator">V4 - ABSOLUTE PATHS</div>

    <div class="arjs-loader">
        <div>Loading SYDE AR Assets...<br>Please wait.</div>
    </div>

    <a-scene 
        embedded 
        arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
        vr-mode-ui="enabled: false"
        renderer="logarithmicDepthBuffer: true;">

        <a-assets>
            <img id="image-1" src="Ventech.png" crossorigin="anonymous">
            <img id="image-2" src="S1000.png" crossorigin="anonymous">
            <img id="image-3" src="Sound.png" crossorigin="anonymous">
        </a-assets>

        <a-nft 
            type="nft" 
            url="https://jagrnght.github.io/SYDEgallery/markers/SYDE" 
            smooth="true" smoothCount="10">
            <a-image src="#image-1" position="50 0 -50" rotation="-90 0 0" width="100" height="75"></a-image>
        </a-nft>

        <a-nft 
            type="nft" 
            url="https://jagrnght.github.io/SYDEgallery/markers/fountain" 
            smooth="true" smoothCount="10">
            <a-image src="#image-2" position="50 0 -50" rotation="-90 0 0" width="100" height="75"></a-image>
        </a-nft>

        <a-nft 
            type="nft" 
            url="https://jagrnght.github.io/SYDEgallery/markers/piano" 
            smooth="true" smoothCount="10">
            <a-image src="#image-3" position="50 0 -50" rotation="-90 0 0" width="100" height="75"></a-image>
        </a-nft>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        window.addEventListener('arjs-nft-loaded', () => {
            const loader = document.querySelector('.arjs-loader');
            if (loader) loader.style.display = 'none';
        });
    </script>
</body>
</html>
